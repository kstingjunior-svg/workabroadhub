    <!-- Cache-busting: tell every browser and proxy never to cache the HTML shell.
         Vite fingerprints JS/CSS assets (e.g. /assets/main-Ab3kQ9.js) so those
         are safe to cache forever; only this file needs to stay fresh. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma"        content="no-cache" />
    <meta http-equiv="Expires"       content="0" />
    <meta name="version"             content="2026.04.14.003" />

    <!-- Version-check: detects when a new build is deployed and offers a reload.
         Works by comparing the content-hash that Vite embeds in the main bundle's
         filename (e.g. "/assets/main-Ab3kQ9.js") between page loads.
         - Reads the hash stored in sessionStorage from the previous load.
         - Extracts the hash from the first <script type="module"> src it finds.
         - If they differ a "New version" banner appears (no forced refresh loop). -->
    <script>
      (function () {
        try {
          var STORAGE_KEY = "wah_build_hash";
          var RELOAD_FLAG = "wah_reloaded_once";

          // Log the version tag so it's visible in DevTools → Console on every load
          var versionMeta = document.querySelector('meta[name="version"]');
          if (versionMeta) {
            console.info("[WorkAbroad Hub] version " + versionMeta.getAttribute("content"));
          }

          function extractHash(src) {
            var m = src && src.match(/\/assets\/[^-]+-([A-Za-z0-9_-]+)\./);
            return m ? m[1] : null;
          }

          function showBanner() {
            if (document.getElementById("wah-update-banner")) return;
            var b = document.createElement("div");
            b.id = "wah-update-banner";
            b.setAttribute("style", [
              "position:fixed;bottom:0;left:0;right:0;z-index:99999",
              "background:#0e7490;color:#fff;font-family:sans-serif",
              "font-size:14px;padding:10px 16px",
              "display:flex;align-items:center;justify-content:center;gap:12px"
            ].join(";"));
            b.innerHTML =
              "<span>A new version of WorkAbroad Hub is available.</span>" +
              "<button onclick=\"sessionStorage.removeItem('" + STORAGE_KEY + "');location.reload(true)\" " +
              "style=\"background:#fff;color:#0e7490;border:none;border-radius:4px;" +
              "padding:4px 12px;cursor:pointer;font-weight:600\">Reload</button>" +
              "<button onclick=\"this.parentNode.remove()\" " +
              "style=\"background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.4);" +
              "border-radius:4px;padding:4px 10px;cursor:pointer\">Later</button>";
            document.body ? document.body.appendChild(b) : document.addEventListener("DOMContentLoaded", function(){ document.body.appendChild(b); });
          }

          // After the page is fully parsed, inspect the injected module script
          document.addEventListener("DOMContentLoaded", function () {
            var scripts = document.querySelectorAll("script[type=module][src]");
            var currentHash = null;
            for (var i = 0; i < scripts.length; i++) {
              currentHash = extractHash(scripts[i].getAttribute("src"));
              if (currentHash) break;
            }
            if (!currentHash) return; // dev mode — src is /src/main.tsx, no hash

            var storedHash = sessionStorage.getItem(STORAGE_KEY);
            if (!storedHash) {
              sessionStorage.setItem(STORAGE_KEY, currentHash);
              return;
            }
            if (storedHash !== currentHash) {
              // New build detected
              if (!sessionStorage.getItem(RELOAD_FLAG)) {
                // Attempt a silent one-time hard-reload first
                sessionStorage.setItem(RELOAD_FLAG, "1");
                sessionStorage.setItem(STORAGE_KEY, currentHash);
                location.reload(true);
              } else {
                // Already reloaded once — show banner instead of looping
                sessionStorage.removeItem(RELOAD_FLAG);
                sessionStorage.setItem(STORAGE_KEY, currentHash);
                showBanner();
              }
            } else {
              sessionStorage.removeItem(RELOAD_FLAG);
            }
          });
        } catch (e) { /* never break the page */ }
      })();
    </script>
